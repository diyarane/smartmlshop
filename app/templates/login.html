{% extends "base.html" %}

{% block title %}Login - Smart Shop Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Login</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                
                <hr>
                
                <div class="alert alert-info">
                    <h6>Demo Credentials:</h6>
                    <p class="mb-0"><strong>Manager:</strong> manager / manager123</p>
                    <p class="mb-0"><strong>Employee:</strong> employee1 / emp123</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
